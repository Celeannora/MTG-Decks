name: Validate Decklists

on:
  push:
    paths:
      - 'Decks/**/decklist.txt'
      - 'cards_by_category/**'   # re-validate all decks after any rotation/DB update
  pull_request:
    paths:
      - 'Decks/**/decklist.txt'
      - 'cards_by_category/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate all decklists

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Find and validate all decklists
        run: |
          set -e
          FAIL=0
          for f in $(find Decks -name 'decklist.txt' 2>/dev/null); do
            echo "--- Validating $f ---"
            python scripts/validate_decklist.py --quiet "$f" || FAIL=1
          done
          if [ $FAIL -ne 0 ]; then
            echo "One or more decklists failed validation."
            exit 1
          fi
          echo "All decklists passed validation."

      - name: Regenerate deck index
        run: python scripts/index_decks.py

      - name: Commit updated deck index (if changed)
        if: github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Decks/_INDEX.md
          git diff --cached --quiet || git commit -m "chore: regenerate Decks/_INDEX.md [skip ci]"
          git push
